<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who is in this week?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
<style>
  :root {
    --bg: #F4EFE6;
    --bg-card: #FFFFFF;
    --navy: #182957;
    --text: #182957;
    --text-muted: #7A7468;
    --border: #E5DECF;
    --border-strong: #D4CBB7;
    --accent: #B8862B;
    --lakkegata: #C8333A;
    --lakkegata-bg: #FBE5E5;
    --kalbakken: #3F6043;
    --kalbakken-bg: #E8EFE6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    padding: 28px 20px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  .logo { height: 56px; width: auto; display: block; margin-bottom: 20px; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 44px;
    letter-spacing: -0.025em;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--navy);
  }
  h1 .accent { font-style: italic; font-weight: 400; color: var(--accent); }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 22px; }
  .subtitle .swatch {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; vertical-align: 1px; margin: 0 3px 0 8px;
  }
  .subtitle .swatch:first-of-type { margin-left: 0; }
  .name-box {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    transition: border-color 0.15s;
  }
  .name-box:focus-within { border-color: var(--navy); }
  .name-box label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .name-box input {
    flex: 1; border: none; background: transparent;
    font-family: inherit; font-size: 15px; color: var(--navy);
    outline: none; font-weight: 500;
  }
  .name-box input::placeholder { color: var(--text-muted); }
  .name-box .auto {
    font-size: 11px; color: var(--text-muted);
    background: var(--bg); padding: 3px 8px;
    border-radius: 4px; font-weight: 500;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .name-prompt {
    background: #FFF3D6; border: 1px solid #EBD9A0;
    color: #6E5520; border-radius: 10px;
    padding: 10px 14px; margin-top: 10px;
    font-size: 13px; display: none;
  }
  .name-prompt.show { display: block; }
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; font-size: 12px; color: var(--text-muted);
  }
  .status-bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
  }
  .status-bar.synced .dot { background: var(--kalbakken); }
  .status-bar.error .dot { background: var(--lakkegata); }
  .week-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 19px; color: var(--navy);
    margin: 32px 0 14px; font-weight: 400;
    display: flex; align-items: baseline; gap: 12px;
  }
  .week-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .day-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .day-card.today { border-color: var(--navy); }
  .day-header {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 12px; gap: 10px;
  }
  .day-date { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .day-name {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 21px; letter-spacing: -0.01em; color: var(--navy);
  }
  .day-num { color: var(--text-muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .today-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--bg-card); background: var(--navy);
    padding: 4px 8px; border-radius: 4px;
  }
  .buttons { display: flex; gap: 8px; }
  .btn {
    flex: 1; border: 1.5px solid var(--border); background: transparent;
    padding: 11px 14px; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--navy); cursor: pointer; transition: all 0.12s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { border-color: var(--navy); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .btn.lakkegata .dot { background: var(--lakkegata); }
  .btn.kalbakken .dot { background: var(--kalbakken); }
  .btn.active.lakkegata { background: var(--lakkegata); border-color: var(--lakkegata); color: white; }
  .btn.active.kalbakken { background: var(--kalbakken); border-color: var(--kalbakken); color: white; }
  .btn.active .dot { background: rgba(255,255,255,0.75); }
  .btn .count { font-size: 12px; color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .btn.active .count { color: rgba(255,255,255,0.8); }
  .attendees {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .attendee-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; flex-wrap: wrap;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 3px 8px; border-radius: 4px;
    flex-shrink: 0;
  }
  .pill.lakkegata { background: var(--lakkegata-bg); color: var(--lakkegata); }
  .pill.kalbakken { background: var(--kalbakken-bg); color: var(--kalbakken); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill.lakkegata .dot { background: var(--lakkegata); }
  .pill.kalbakken .dot { background: var(--kalbakken); }
  .names { color: var(--navy); font-weight: 500; }
  .names .me {
    background: var(--navy); color: var(--bg-card);
    padding: 1px 5px; border-radius: 3px; font-size: 12px;
  }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .setup-warn {
    background: #FFF3D6; border: 1px solid #EBD9A0;
    color: #6E5520; padding: 16px; border-radius: 12px;
    margin-bottom: 20px; font-size: 14px;
  }
  .setup-warn code {
    background: rgba(0,0,0,0.06); padding: 1px 6px;
    border-radius: 3px; font-size: 12px;
  }
  @media (max-width: 500px) {
    h1 { font-size: 32px; }
    body { padding: 20px 14px 60px; }
    .day-card { padding: 14px; }
    .btn { padding: 10px; font-size: 13px; }
    .logo { height: 44px; }
  }
</style>
</head>

    <h1>Who&rsquo;s <span class="accent">in</span> this week?</h1>
    <p class="subtitle">
      <span class="swatch" style="background:var(--lakkegata)"></span>Lakkegata
      <span class="swatch" style="background:var(--kalbakken)"></span>Kalbakken
      &nbsp;&middot;&nbsp; tap to mark yourself
    </p>
    <div class="name-box">
      <label for="name">You are</label>
      <input type="text" id="name" placeholder="your name (e.g. Kari H)" autocomplete="off" spellcheck="false">
      <span id="auto-badge" class="auto" style="display:none;">from Teams</span>
    </div>
    <div id="name-prompt" class="name-prompt">
      Pop your name in above first, then you can mark your days.
    </div>
    <div id="status" class="status-bar"><span class="dot"></span><span id="status-text">Connecting&hellip;</span></div>
  </header>

  <div id="content"><div class="loading">Loading&hellip;</div></div>
</div>

<script>
// ============================================================
// SETUP - paste your Cloudflare Worker URL here, save, upload.
// ============================================================
const WORKER_URL = "https://tine-office-days.edvardmytteis.workers.dev/";
// ============================================================

let username = '';
let attendance = {};
let saving = false;
let identityFromTeams = false;

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function formatTeamsName(displayName) {
  if (!displayName) return '';
  const parts = displayName.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  // Handle "Last, First" format (common in AD)
  if (parts[0].endsWith(',')) {
    const first = parts[1] || '';
    const lastInitial = parts[0].replace(',','').charAt(0).toUpperCase();
    return first + ' ' + lastInitial;
  }
  const first = parts[0];
  const lastInitial = parts[parts.length - 1].charAt(0).toUpperCase();
  return first + ' ' + lastInitial;
}

async function initTeamsIdentity() {
  if (typeof microsoftTeams === 'undefined') return null;
  try {
    await microsoftTeams.app.initialize();
    const ctx = await microsoftTeams.app.getContext();
    const displayName = ctx && ctx.user && ctx.user.displayName;
    if (displayName) return formatTeamsName(displayName);
  } catch (e) { /* not running inside Teams */ }
  return null;
}

function getDaysToShow() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const daysSinceMonday = (dow + 6) % 7;
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - daysSinceMonday);
  const all = [];
  for (let w = 0; w < 2; w++) {
    for (let i = 0; i < 5; i++) {
      const d = new Date(thisMonday);
      d.setDate(thisMonday.getDate() + w*7 + i);
      all.push(d);
    }
  }
  return all.filter(d => d >= today);
}

function splitWeeks(days) {
  if (days.length === 0) return [[],[]];
  const first = days[0];
  const dow = first.getDay();
  const daysSinceMonday = (dow + 6) % 7;
  const firstMonday = new Date(first);
  firstMonday.setDate(first.getDate() - daysSinceMonday);
  const nextMonday = new Date(firstMonday);
  nextMonday.setDate(firstMonday.getDate() + 7);
  return [days.filter(d => d < nextMonday), days.filter(d => d >= nextMonday)];
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setStatus(state, text) {
  const bar = document.getElementById('status');
  bar.className = 'status-bar ' + state;
  document.getElementById('status-text').textContent = text;
}

async function fetchAttendance() {
  if (!WORKER_URL || WORKER_URL.startsWith('PASTE')) return null;
  try {
    const res = await fetch(WORKER_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    console.error('Fetch failed', e);
    setStatus('error', 'Cannot reach the shared list (' + e.message + ')');
    return null;
  }
}

async function pushAttendance() {
  if (!WORKER_URL || WORKER_URL.startsWith('PASTE')) {
    setStatus('error', 'Worker URL not set - see SETUP block in index.html');
    return false;
  }
  saving = true;
  setStatus('', 'Saving…');
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(attendance)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setStatus('synced', 'Saved · shared with the team');
    return true;
  } catch (e) {
    console.error('Save failed', e);
    setStatus('error', 'Save failed: ' + e.message);
    return false;
  } finally {
    saving = false;
  }
}

async function refreshFromServer() {
  if (saving) return;
  const remote = await fetchAttendance();
  if (remote === null) return;
  if (JSON.stringify(remote) !== JSON.stringify(attendance)) {
    attendance = remote;
    render();
  }
  setStatus('synced', 'Synced · ' + new Date().toLocaleTimeString());
}

function loadStoredName() {
  try { return localStorage.getItem('tine.username') || ''; } catch(e) { return ''; }
}
function storeName(n) {
  try { localStorage.setItem('tine.username', n); } catch(e) {}
}

async function setStatusForDay(dateStr, office) {
  if (!username) {
    document.getElementById('name').focus();
    document.getElementById('name-prompt').classList.add('show');
    return;
  }
  if (!attendance[dateStr]) attendance[dateStr] = {};
  if (attendance[dateStr][username] === office) {
    delete attendance[dateStr][username];
    if (Object.keys(attendance[dateStr]).length === 0) delete attendance[dateStr];
  } else {
    attendance[dateStr][username] = office;
  }
  render();
  await pushAttendance();
}
window.setStatusForDay = setStatusForDay;

function renderNames(names) {
  return names.map(n => n === username
    ? '<span class="me">' + escapeHtml(n) + '</span>'
    : escapeHtml(n)
  ).join(', ');
}

function renderDay(d, today) {
  const key = dateKey(d);
  const isToday = isSameDay(d, today);
  const dayData = attendance[key] || {};
  const myStatus = dayData[username];
  const lakkegata = Object.entries(dayData).filter(([_,o]) => o === 'Lakkegata').map(([n]) => n).sort();
  const kalbakken = Object.entries(dayData).filter(([_,o]) => o === 'Kalbakken').map(([n]) => n).sort();
  const dayName = DAYS[d.getDay()];
  const dateLabel = d.getDate() + ' ' + MONTHS[d.getMonth()];

  let html = '<div class="day-card' + (isToday ? ' today' : '') + '">';
  html += '<div class="day-header">';
  html += '<div class="day-date"><span class="day-name">' + dayName + '</span><span class="day-num">' + dateLabel + '</span></div>';
  if (isToday) html += '<span class="today-badge">Today</span>';
  html += '</div>';
  html += '<div class="buttons">';
  html += '<button class="btn lakkegata' + (myStatus === 'Lakkegata' ? ' active' : '') + '" onclick="setStatusForDay(\'' + key + '\',\'Lakkegata\')">';
  html += '<span class="dot"></span>Lakkegata';
  if (lakkegata.length > 0) html += ' <span class="count">' + lakkegata.length + '</span>';
  html += '</button>';
  html += '<button class="btn kalbakken' + (myStatus === 'Kalbakken' ? ' active' : '') + '" onclick="setStatusForDay(\'' + key + '\',\'Kalbakken\')">';
  html += '<span class="dot"></span>Kalbakken';
  if (kalbakken.length > 0) html += ' <span class="count">' + kalbakken.length + '</span>';
  html += '</button>';
  html += '</div>';
  if (lakkegata.length > 0 || kalbakken.length > 0) {
    html += '<div class="attendees">';
    if (lakkegata.length > 0) {
      html += '<div class="attendee-row"><span class="pill lakkegata"><span class="dot"></span>Lakkegata</span><span class="names">' + renderNames(lakkegata) + '</span></div>';
    }
    if (kalbakken.length > 0) {
      html += '<div class="attendee-row"><span class="pill kalbakken"><span class="dot"></span>Kalbakken</span><span class="names">' + renderNames(kalbakken) + '</span></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function render() {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = getDaysToShow();
  const [thisWeek, nextWeek] = splitWeeks(days);
  let html = '';
  if (thisWeek.length > 0) {
    html += '<div class="week-label">This week</div>';
    thisWeek.forEach(d => html += renderDay(d, today));
  }
  if (nextWeek.length > 0) {
    html += '<div class="week-label">Next week</div>';
    nextWeek.forEach(d => html += renderDay(d, today));
  }
  document.getElementById('content').innerHTML = html;
}

let nameDebounce;
document.getElementById('name').addEventListener('input', (e) => {
  if (identityFromTeams) return;
  clearTimeout(nameDebounce);
  const v = e.target.value.trim();
  nameDebounce = setTimeout(() => {
    username = v;
    storeName(v);
    if (username) document.getElementById('name-prompt').classList.remove('show');
    render();
  }, 250);
});

async function boot() {
  if (!WORKER_URL || WORKER_URL.startsWith('PASTE')) {
    document.getElementById('content').innerHTML =
      '<div class="setup-warn"><strong>Setup needed.</strong> Open <code>index.html</code> in a text editor and paste your Cloudflare Worker URL into the <code>SETUP</code> block at the top of the &lt;script&gt;.</div>';
    setStatus('error', 'Not configured yet');
    return;
  }

  // Try Teams first; fallback to manual name
  const teamsName = await initTeamsIdentity();
  const input = document.getElementById('name');
  if (teamsName) {
    username = teamsName;
    identityFromTeams = true;
    input.value = teamsName;
    input.readOnly = true;
    document.getElementById('auto-badge').style.display = 'inline-block';
  } else {
    username = loadStoredName();
    input.value = username;
  }

  const remote = await fetchAttendance();
  attendance = remote || {};
  render();
  if (remote !== null) {
    setStatus('synced', 'Synced · ' + new Date().toLocaleTimeString());
  }

  setInterval(refreshFromServer, 10000);
}

boot();
</script>
</body>
</html>
